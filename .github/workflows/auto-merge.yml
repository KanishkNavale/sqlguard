name: Auto-merger

on:
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, ready_for_review]
    
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Enable Auto-Merge
        run: |
          gh pr merge "${{ github.event.pull_request.html_url }}" \
            --rebase \
            --auto \
            --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITKAT }}