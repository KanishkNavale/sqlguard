name: Auto-merge PRs

on:
  pull_request_target:
  workflow_call:
    inputs:
      mode:
        description: "Select a merging strategy: {rebase, squash}"
        default: "rebase"
        type: string


permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    steps:
      - name: Activate auto-merge for the PR
        run: |
          if [ "${{ inputs.mode }}" == "rebase" ]; then
            gh pr merge --auto --rebase "$PR_URL"
          else
            gh pr merge --auto --squash "$PR_URL"
          fi

        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITKAT }}
